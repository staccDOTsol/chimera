# fly.toml — deploy the Chimera host. `fly launch --copy-config --now` (or `fly deploy`).
#
# ONE machine on purpose: the body lives in memory and SSE connections are pinned,
# so a second machine would be a SEPARATE body. Federation over Tor (milestone 4) is
# how multiple bodies are meant to scale — not horizontal replicas of one.
app = "twitmolt"
primary_region = "iad"

[build]

[http_service]
  internal_port = 8787
  force_https = false   # TLS terminates at Cloudflare (Flexible); CF→origin is plain HTTP, so Fly must not redirect
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  [http_service.concurrency]
    type = "connections"
    hard_limit = 2500
    soft_limit = 2000

  # self-heal: Fly probes /api/stats; if the app hangs, crashes, or the worker host goes
  # unreachable (the [PU03] outages), the check fails and Fly auto-restarts/replaces the
  # machine onto a healthy host — no manual intervention. grace_period covers the ~1s
  # body-restore on boot so a fresh machine isn't killed before it's ready.
  [[http_service.checks]]
    grace_period = "25s"
    interval = "15s"
    method = "GET"
    timeout = "8s"
    path = "/api/stats"

[mounts]
  source = "chimera_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-4x"
  memory = "2048mb"
